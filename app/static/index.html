<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bug Database</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --border: #2a2f3a;
    --text: #e6e9ef; --muted: #8b93a7; --accent: #5b9dff; --accent2: #3b82f6;
    --green: #3fb950; --red: #f85149; --amber: #d29922; --purple: #a371f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 12px 20px;
    background: var(--panel); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .health { font-size: 12px; color: var(--muted); }
  header .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-right: 5px; }
  header .dot.ok { background: var(--green); }
  header .dot.bad { background: var(--red); }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
  input, select, textarea, button {
    font: inherit; color: var(--text); background: var(--panel2);
    border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  button { cursor: pointer; background: var(--panel2); }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  button.primary:hover { background: var(--accent); }
  button.danger { color: var(--red); }
  button.danger:hover { border-color: var(--red); }
  .search { flex: 1; min-width: 200px; }
  .grid { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px;
    cursor: pointer; transition: border-color .15s;
  }
  .card:hover { border-color: var(--accent); }
  .card .title { font-weight: 600; margin-bottom: 6px; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 12px; color: var(--muted); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px;
    font-weight: 600; border: 1px solid var(--border);
  }
  .badge.open { color: var(--amber); border-color: var(--amber); }
  .badge.fixed { color: var(--accent); border-color: var(--accent); }
  .badge.confirmed { color: var(--green); border-color: var(--green); }
  .badge.wont_fix { color: var(--muted); }
  .badge.duplicate { color: var(--purple); border-color: var(--purple); }
  .badge.floating { color: var(--purple); border-color: var(--purple); }
  .badge.score { color: var(--accent); border-color: var(--accent); }
  .id { color: var(--muted); font-variant-numeric: tabular-nums; }
  .empty { text-align: center; color: var(--muted); padding: 40px; }
  /* modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none;
    align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; z-index: 50;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    width: 100%; max-width: 760px; padding: 20px 24px;
  }
  .modal h2 { margin: 0 0 4px; font-size: 18px; }
  .modal .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; flex: 1; min-width: 180px; }
  .field label { font-size: 12px; color: var(--muted); }
  .field input, .field select, .field textarea { width: 100%; }
  textarea { resize: vertical; min-height: 70px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; }
  pre.block {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; white-space: pre-wrap; word-break: break-word; font-size: 12.5px; margin: 4px 0 14px;
  }
  .section-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin: 14px 0 4px; }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
  .modal-actions .spacer { flex: 1; }
  .occ { border-left: 2px solid var(--border); padding: 4px 0 4px 12px; margin: 6px 0; font-size: 12.5px; }
  .occ .when { color: var(--muted); }
  .close { background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; padding: 0 4px; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; z-index: 100; opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-color: var(--red); color: var(--red); }
  .tag { font-size: 11px; color: var(--muted); }
  .muted { color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>🐞 Bug Database</h1>
  <span id="roleBadge" class="badge" style="margin-left:12px;display:none"></span>
  <button id="keyBtn" style="margin-left:auto">🔑 Set key</button>
  <span class="health"><span id="dot" class="dot"></span><span id="healthText">checking…</span></span>
</header>

<div class="container">
  <div class="toolbar">
    <input id="q" class="search" placeholder="Search bugs (title, description, repro)…" />
    <select id="statusFilter">
      <option value="">All statuses</option>
      <option value="open">open</option>
      <option value="fixed">fixed</option>
      <option value="confirmed">confirmed</option>
      <option value="wont_fix">wont_fix</option>
      <option value="duplicate">duplicate</option>
    </select>
    <select id="floatingFilter">
      <option value="">Floating: any</option>
      <option value="true">Floating only</option>
      <option value="false">Non-floating</option>
    </select>
    <button id="refreshBtn">Refresh</button>
    <button id="auditBtn" style="display:none">📜 Audit</button>
    <button id="shareBtn" style="display:none" title="Copy a read-only link to share">🔗 Share read-only</button>
    <button id="rotateBtn" style="display:none" title="Invalidate old read-only links">♻ Rotate read key</button>
    <button id="newBtn" class="primary" style="display:none">+ New bug</button>
  </div>

  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">No bugs found.</div>
</div>

<!-- Detail / edit modal -->
<div id="modalBg" class="modal-bg">
  <div class="modal" id="modal"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = ""; // same origin
const $ = (s, r=document) => r.querySelector(s);
const esc = (s) => (s ?? "").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtDate = (s) => s ? new Date(s).toLocaleString() : "—";

let state = { bugs: [], searchMode: false };

// ---------- API key (shared-secret auth) ----------
const KEY_STORAGE = "bugdb_api_key";
let role = "anonymous";   // "admin" | "readonly" | "anonymous", set by /whoami

// A key in the URL (?key=...) takes precedence — this is how shared read-only
// links auto-authenticate. We keep it out of localStorage so it doesn't leak
// into an admin's stored key, and strip it from the visible URL bar.
function urlKey() {
  return new URLSearchParams(location.search).get("key") || "";
}
const getApiKey = () => urlKey() || localStorage.getItem(KEY_STORAGE) || "";
function setApiKey(k) {
  if (k) localStorage.setItem(KEY_STORAGE, k);
  else localStorage.removeItem(KEY_STORAGE);
  updateKeyIndicator();
}
function promptApiKey() {
  const current = getApiKey();
  const k = window.prompt(
    "Enter the API key (leave empty to clear).\nStored locally in your browser and sent as X-API-Key.",
    current
  );
  if (k === null) return false;           // cancelled
  setApiKey(k.trim());
  return true;
}
function updateKeyIndicator() {
  const el = $("#keyBtn");
  if (el) el.textContent = getApiKey() ? "🔑 Key set" : "🔑 Set key";
}

// Ask the server which role our key maps to, then show/hide admin-only UI.
async function refreshRole() {
  try {
    const w = await api("/whoami");
    role = w.role;
  } catch { role = "anonymous"; }
  applyRole();
}
function isAdmin() { return role === "admin"; }
function applyRole() {
  // Admin-only header buttons.
  for (const id of ["#newBtn", "#shareBtn", "#auditBtn", "#rotateBtn"]) {
    const el = $(id); if (el) el.style.display = isAdmin() ? "" : "none";
  }
  const badge = $("#roleBadge");
  if (badge) {
    badge.textContent = role === "readonly" ? "read-only" : role;
    badge.style.display = role === "anonymous" ? "none" : "";
  }
}

function toast(msg, isErr=false) {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  setTimeout(() => t.className = "toast", 2200);
}

async function api(path, opts={}, _retried=false) {
  const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
  const key = getApiKey();
  if (key) headers["X-API-Key"] = key;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) {
    // Auth required or key wrong: prompt once, then retry the same request.
    if (!_retried && promptApiKey() && getApiKey()) {
      return api(path, opts, true);
    }
    throw new Error("401: missing or invalid API key");
  }
  if (!res.ok) {
    let detail = res.statusText;
    try { detail = (await res.json()).detail || detail; } catch {}
    throw new Error(`${res.status}: ${detail}`);
  }
  return res.status === 204 ? null : res.json();
}

async function checkHealth() {
  try {
    const h = await api("/health");
    $("#dot").className = "dot ok";
    $("#healthText").textContent = `${h.status} · ${h.database} · v${h.version}`;
  } catch {
    $("#dot").className = "dot bad";
    $("#healthText").textContent = "API unreachable";
  }
}

function badge(b) {
  let out = `<span class="badge ${b.status}">${b.status}</span>`;
  if (b.is_floating) out += ` <span class="badge floating">floating</span>`;
  return out;
}

function bugCard(b, score, reason) {
  const div = document.createElement("div");
  div.className = "card";
  const tags = (b.tags||[]).slice(0,6).map(t => `<span class="tag">#${esc(t)}</span>`).join(" ");
  const scoreBadge = score != null ? `<span class="badge score">${(score*100).toFixed(0)}% ${reason}</span>` : "";
  div.innerHTML = `
    <div class="title"><span class="id">#${b.id}</span> ${esc(b.title)}</div>
    <div class="meta">
      ${badge(b)} ${scoreBadge}
      <span>seen ×${b.times_seen}</span>
      <span>last: ${fmtDate(b.last_seen_at)}</span>
      ${b.component ? `<span>· ${esc(b.component)}</span>` : ""}
      ${tags}
    </div>`;
  div.onclick = () => openDetail(b.id);
  return div;
}

function render(items, withScores=false) {
  const grid = $("#grid");
  grid.innerHTML = "";
  if (!items.length) { $("#empty").style.display = "block"; return; }
  $("#empty").style.display = "none";
  for (const it of items) {
    if (withScores) grid.appendChild(bugCard(it.bug, it.score, it.reason));
    else grid.appendChild(bugCard(it));
  }
}

async function loadList() {
  state.searchMode = false;
  const params = new URLSearchParams();
  const st = $("#statusFilter").value;
  const fl = $("#floatingFilter").value;
  if (st) params.set("status", st);
  if (fl) params.set("is_floating", fl);
  params.set("limit", "500");
  try {
    state.bugs = await api("/bugs?" + params.toString());
    render(state.bugs);
  } catch (e) { toast(e.message, true); }
}

let searchTimer;
async function doSearch() {
  const q = $("#q").value.trim();
  if (!q) { loadList(); return; }
  state.searchMode = true;
  try {
    const res = await api("/bugs/search?threshold=0.15&limit=50", {
      method: "POST",
      body: JSON.stringify({ title: q, full_description: q, steps_to_reproduce: q })
    });
    render(res.matches, true);
  } catch (e) { toast(e.message, true); }
}

// ---------- Detail modal ----------
function closeModal() {
  $("#modalBg").className = "modal-bg";
  // Clear the deep-link hash when closing (without adding history entries).
  if (location.hash) history.replaceState(null, "", location.pathname + location.search);
}
$("#modalBg").onclick = (e) => { if (e.target.id === "modalBg") closeModal(); };
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

async function openDetail(id, updateHash=true) {
  // Reflect the open bug in the URL so it can be shared / bookmarked.
  if (updateHash && location.hash !== `#/bug/${id}`) location.hash = `/bug/${id}`;
  let b;
  try { b = await api("/bugs/" + id); } catch (e) { return toast(e.message, true); }
  const occ = (b.occurrences||[]).slice().reverse().map(o => `
    <div class="occ">
      <span class="when">${fmtDate(o.seen_at)}</span>
      ${o.cluster ? ` · cluster ${esc(o.cluster)}` : ""}
      ${o.namespace ? ` · ns ${esc(o.namespace)}` : ""}
      ${o.note ? `<br>${esc(o.note)}` : ""}
    </div>`).join("") || `<div class="muted">No occurrences recorded.</div>`;

  const field = (label, val) => val ? `<div class="section-label">${label}</div><pre class="block">${esc(val)}</pre>` : "";

  $("#modal").innerHTML = `
    <div style="display:flex;align-items:flex-start;gap:10px">
      <h2 style="flex:1"><span class="id">#${b.id}</span> ${esc(b.title)}</h2>
      <button onclick="copyBugLink(${b.id})" title="Copy shareable link">🔗 Copy link</button>
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <div class="meta" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
      ${badge(b)}
      <span class="muted">seen ×${b.times_seen} · updated ×${b.times_updated}</span>
      <span class="muted">first ${fmtDate(b.first_seen_at)} · last ${fmtDate(b.last_seen_at)}</span>
    </div>
    <div class="meta" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px">
      ${b.component ? `<span class="muted">component: ${esc(b.component)}</span>` : ""}
      ${b.finalizer ? `<span class="muted">finalizer: ${esc(b.finalizer)}</span>` : ""}
      ${b.cluster ? `<span class="muted">cluster: ${esc(b.cluster)}</span>` : ""}
    </div>
    ${(b.tags||[]).length ? `<div style="margin-bottom:6px">${b.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join(" ")}</div>` : ""}
    ${field("Short description", b.short_description)}
    ${field("Full description", b.full_description)}
    ${field("Steps to reproduce", b.steps_to_reproduce)}
    ${field("Suggested fix", b.suggested_fix)}
    <div class="section-label">Occurrences (${(b.occurrences||[]).length})</div>
    ${occ}
    ${isAdmin() ? `
    <div class="section-label">Record a sighting</div>
    <div class="row">
      <div class="field"><label>Cluster</label><input id="occCluster" placeholder="e.g. 12345"></div>
      <div class="field"><label>Namespace</label><input id="occNs" placeholder="optional"></div>
      <div class="field" style="flex:2"><label>Note</label><input id="occNote" placeholder="optional"></div>
    </div>
    <div class="modal-actions">
      <button onclick="recordSighting(${b.id})">+ Record sighting</button>
      <button onclick="editBug(${b.id})">Edit</button>
      ${b.is_confirmed ? "" : `<button onclick="confirmBug(${b.id})">Confirm fixed</button>`}
      <button onclick="toggleFloating(${b.id}, ${!b.is_floating})">${b.is_floating ? "Unmark" : "Mark"} floating</button>
      <button onclick="showAudit(${b.id})">📜 History</button>
      <span class="spacer"></span>
      <button class="danger" onclick="deleteBug(${b.id})">Delete</button>
    </div>` : `
    <div class="modal-actions"><span class="muted">Read-only view.</span></div>`}`;
  $("#modalBg").className = "modal-bg show";
}

async function recordSighting(id) {
  const body = {
    cluster: $("#occCluster").value.trim() || null,
    namespace: $("#occNs").value.trim() || null,
    note: $("#occNote").value.trim() || ""
  };
  try {
    await api(`/bugs/${id}/occurrences`, { method: "POST", body: JSON.stringify(body) });
    toast("Sighting recorded");
    openDetail(id); refreshCurrent();
  } catch (e) { toast(e.message, true); }
}

async function confirmBug(id) {
  try {
    await api(`/bugs/${id}`, { method: "PATCH", body: JSON.stringify({ is_fixed: true, is_confirmed: true }) });
    toast("Marked fixed + confirmed");
    openDetail(id); refreshCurrent();
  } catch (e) { toast(e.message, true); }
}

async function toggleFloating(id, val) {
  try {
    await api(`/bugs/${id}`, { method: "PATCH", body: JSON.stringify({ is_floating: val }) });
    toast(val ? "Marked floating" : "Unmarked floating");
    openDetail(id); refreshCurrent();
  } catch (e) { toast(e.message, true); }
}

async function deleteBug(id) {
  if (!confirm(`Delete bug #${id}? This cannot be undone.`)) return;
  try {
    await api("/bugs/" + id, { method: "DELETE" });
    toast("Deleted"); closeModal(); refreshCurrent();
  } catch (e) { toast(e.message, true); }
}

// ---------- Create / edit form ----------
function formModal(bug) {
  const b = bug || {};
  const isEdit = !!bug;
  const v = (k) => esc(b[k] ?? "");
  $("#modal").innerHTML = `
    <div style="display:flex;align-items:flex-start;gap:10px">
      <h2 style="flex:1">${isEdit ? `Edit bug #${b.id}` : "New bug"}</h2>
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <div class="field"><label>Title *</label><input id="f_title" value="${v('title')}" placeholder="One-line title"></div>
    <div class="row">
      <div class="field"><label>Component</label><input id="f_component" value="${v('component')}"></div>
      <div class="field"><label>Finalizer</label><input id="f_finalizer" value="${v('finalizer')}"></div>
      <div class="field"><label>Cluster</label><input id="f_cluster" value="${v('cluster')}"></div>
    </div>
    <div class="field"><label>Short description</label><textarea id="f_short">${v('short_description')}</textarea></div>
    <div class="field"><label>Full description</label><textarea id="f_full">${v('full_description')}</textarea></div>
    <div class="field"><label>Steps to reproduce</label><textarea id="f_steps">${v('steps_to_reproduce')}</textarea></div>
    <div class="field"><label>Suggested fix</label><textarea id="f_fix">${v('suggested_fix')}</textarea></div>
    <div class="row">
      <div class="field"><label>Tags (comma-separated)</label><input id="f_tags" value="${esc((b.tags||[]).join(', '))}"></div>
      ${isEdit ? `<div class="field"><label>Status</label><select id="f_status">
        ${["open","fixed","confirmed","wont_fix","duplicate"].map(s=>`<option ${b.status===s?"selected":""}>${s}</option>`).join("")}
      </select></div>` : ""}
      <div class="field" style="justify-content:flex-end"><label>&nbsp;</label>
        <label style="color:var(--text)"><input type="checkbox" id="f_floating" ${b.is_floating?"checked":""}> Floating</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="primary" onclick="saveBug(${isEdit ? b.id : 'null'})">${isEdit ? "Save" : "Create"}</button>
      <button onclick="${isEdit ? `openDetail(${b.id})` : "closeModal()"}">Cancel</button>
    </div>`;
  $("#modalBg").className = "modal-bg show";
}

function newBug() { formModal(null); }
async function editBug(id) {
  try { formModal(await api("/bugs/" + id)); } catch (e) { toast(e.message, true); }
}

async function saveBug(id) {
  const title = $("#f_title").value.trim();
  if (!title || title.length < 3) return toast("Title must be at least 3 characters", true);
  const tags = $("#f_tags").value.split(",").map(t=>t.trim()).filter(Boolean);
  const payload = {
    title,
    component: $("#f_component").value.trim() || null,
    finalizer: $("#f_finalizer").value.trim() || null,
    cluster: $("#f_cluster").value.trim() || null,
    short_description: $("#f_short").value,
    full_description: $("#f_full").value,
    steps_to_reproduce: $("#f_steps").value,
    suggested_fix: $("#f_fix").value,
    tags,
    is_floating: $("#f_floating").checked,
  };
  try {
    if (id == null) {
      // Use report (find-or-create) to leverage dedupe.
      const res = await api("/bugs/report", { method: "POST", body: JSON.stringify(payload) });
      toast(res.created ? `Created bug #${res.bug.id}` : `Matched existing #${res.bug.id} (${res.matched_by})`);
      closeModal(); refreshCurrent(); openDetail(res.bug.id);
    } else {
      payload.status = $("#f_status").value;
      const b = await api("/bugs/" + id, { method: "PATCH", body: JSON.stringify(payload) });
      toast("Saved"); refreshCurrent(); openDetail(b.id);
    }
  } catch (e) { toast(e.message, true); }
}

function refreshCurrent() { state.searchMode ? doSearch() : loadList(); }

// ---------- shareable links / hash routing ----------
function bugLink(id) { return location.origin + location.pathname + "#/bug/" + id; }

async function copyBugLink(id) {
  const url = bugLink(id);
  try {
    await navigator.clipboard.writeText(url);
    toast("Link copied: " + url);
  } catch {
    // Clipboard API needs a secure context (https) or permission; fall back.
    window.prompt("Copy this link:", url);
  }
}

// Open whatever bug the URL hash points at (#/bug/<id>), or close if none.
function routeFromHash() {
  const m = location.hash.match(/^#\/bug\/(\d+)$/);
  if (m) openDetail(parseInt(m[1], 10), false);   // don't re-set the hash
  else closeModal();
}
window.addEventListener("hashchange", routeFromHash);

// ---------- admin: share read-only link, rotate key, audit ----------
async function shareReadOnlyLink() {
  // Admin fetches the current read-only key from the server and builds a link.
  try {
    const r = await api("/admin/readonly-key");
    if (!r.readonly_api_key) {
      toast("No read-only key set. Use 'Rotate read key' to create one.", true);
      return;
    }
    const url = location.origin + location.pathname + "?key=" + encodeURIComponent(r.readonly_api_key);
    try { await navigator.clipboard.writeText(url); toast("Read-only link copied to clipboard"); }
    catch { window.prompt("Copy this read-only link:", url); }
  } catch (e) { toast(e.message, true); }
}

async function rotateReadKey() {
  if (!confirm("Rotate the read-only key? All existing shared links will stop working.")) return;
  try {
    const r = await api("/admin/rotate-readonly-key", { method: "POST" });
    const url = location.origin + location.pathname + "?key=" + encodeURIComponent(r.readonly_api_key);
    try { await navigator.clipboard.writeText(url); } catch {}
    window.prompt("New read-only key (link copied to clipboard):", url);
    toast("Read-only key rotated");
  } catch (e) { toast(e.message, true); }
}

async function showAudit(bugId) {
  try {
    const q = bugId ? ("?bug_id=" + bugId + "&limit=200") : "?limit=200";
    const rows = await api("/audit" + q);
    const fmtDetail = (a) => {
      if (a.action === "update" || a.action === "confirm") {
        const ch = (a.detail && a.detail.changes) || {};
        return Object.entries(ch).map(([k, v]) =>
          `${esc(k)}: ${esc(JSON.stringify(v.old))} → ${esc(JSON.stringify(v.new))}`).join("<br>") || "—";
      }
      if (a.action === "sighting") { const d=a.detail||{}; return esc([d.cluster,d.namespace,d.note].filter(Boolean).join(" · ")||"—"); }
      if (a.detail && a.detail.snapshot) return esc(a.detail.snapshot.title || "");
      return "";
    };
    const list = rows.map(a => `
      <div class="occ">
        <span class="when">${fmtDate(a.at)}</span>
        · <span class="badge">${esc(a.actor_role)}</span>
        · <b>${esc(a.action)}</b>${a.bug_id ? ` #${a.bug_id}` : ""}
        ${a.bug_title ? ` — ${esc(a.bug_title)}` : ""}
        <div class="muted" style="margin-top:2px">${fmtDetail(a)}</div>
      </div>`).join("") || `<div class="muted">No audit entries.</div>`;
    $("#modal").innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:10px">
        <h2 style="flex:1">📜 Audit history ${bugId ? "for #" + bugId : "(all)"}</h2>
        <button class="close" onclick="closeModal()">×</button>
      </div>
      ${list}`;
    $("#modalBg").className = "modal-bg show";
  } catch (e) { toast(e.message, true); }
}

// ---------- wiring ----------
$("#refreshBtn").onclick = loadList;
$("#newBtn").onclick = newBug;
$("#auditBtn").onclick = () => showAudit(null);
$("#shareBtn").onclick = shareReadOnlyLink;
$("#rotateBtn").onclick = rotateReadKey;
$("#keyBtn").onclick = () => { if (promptApiKey()) { checkHealth(); refreshRole().then(refreshCurrent); } };
$("#statusFilter").onchange = loadList;
$("#floatingFilter").onchange = loadList;
$("#q").oninput = () => { clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 250); };

updateKeyIndicator();
checkHealth();
refreshRole().then(() => loadList().then(routeFromHash));
setInterval(checkHealth, 15000);
</script>
